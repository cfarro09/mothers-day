<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='75'>🎁</text></svg>" />
    <link rel="stylesheet" href="./css/box.css?v=1.0">
    <title>Feliz primer Día de la Madre, Graciela</title>
</head>

<body>
    <div class="logo">
        <div class="box">
            <span class="box-lid">Carlos & Ismael</span>
        </div>
    </div>

    <main class="card">
        <img class="img" src="./img/caja1.gif" alt="Gift Mother">
        <div class="greetings">
            <span>G</span>
            <span>r</span>
            <span>a</span>
            <span>c</span>
            <span>i</span>
            <span>e</span>
            <span>l</span>
            <span>a</span>
        </div>
        <div class="description">
            <span>Feliz primer Día de la Madre, Graciela. Ismael y yo te amamos con todo el corazón.</span>
        </div>
        <p class="dedication">Con amor de parte de Carlos Farro e Ismael, en tu primer Día de la Madre. 💖</p>
        <div class="button-group">
            <button class="action-button" type="button" data-target="./animate-1" aria-label="Abrir sorpresa"><span
                    class="action-icon" aria-hidden="true">🎁</span><span class="action-tooltip">Abrir
                    sorpresa</span></button>
            <button class="action-button" type="button" data-target="./animate-2"
                data-transition-image="./img/corazon.png" data-transition-class="rose-transition"
                aria-label="Abrir sorpresa"><span class="action-icon" aria-hidden="true">💝</span><span
                    class="action-tooltip">Abrir
                    sorpresa</span></button>
        </div>
    </main>
    <script src="./js/index.js"></script>
</body>

</html>
